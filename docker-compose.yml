networks:
  service-net:
    driver: bridge

volumes:
  pgdata:
  pnog-graph-data:
  frontend-node-modules:

services:

  # ── DATA ─────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks: [service-net]
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./service/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APPLICATION ───────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nginx
    networks: [service-net]
    ports:
      - "80:80"
    volumes:
      - ./service/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi

  fastapi:
    build:
      context: ./service/backend
      dockerfile: Dockerfile
    container_name: fastapi
    command: sh -c "pip install psycopg2-binary==2.9.6 && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks: [service-net]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DISABLE_KAFKA: "1"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./service/backend:/app
      - /tmp/uploads:/app/uploads

  # Celery removed (was Redis-backed)

  frontend:
    build:
      context: ./service/frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks: [service-net]
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "/api"
      INTERNAL_API_BASE: http://fastapi:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./service/frontend:/app
      - frontend-node-modules:/app/node_modules
    command: ["sh", "-c", "npm install && exec npx next dev -H 0.0.0.0 -p 3000"]

  # (Kafka + Prometheus + PNOG monitor services removed)
