# ── Input: receive logs from Docker logging driver ─────────────
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ── Nginx → net.requests ──────────────────────────────────────
<filter docker.nginx**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

<match docker.nginx**>
  @type kafka2
  brokers kafka:9092
  topic net.requests
  <format>
    @type json
  </format>
  <buffer>
    @type memory
    flush_interval 1s
  </buffer>
</match>

# ── FastAPI / Celery → app.events ─────────────────────────────
<match docker.fastapi** docker.celery**>
  @type kafka2
  brokers kafka:9092
  topic app.events
  <format>
    @type json
  </format>
  <buffer>
    @type memory
    flush_interval 1s
  </buffer>
</match>

# ── All containers → pod.logs (K8s equivalent) ────────────────
<match docker.**>
  @type kafka2
  brokers kafka:9092
  topic pod.logs
  <format>
    @type json
  </format>
  <buffer>
    @type memory
    flush_interval 2s
  </buffer>
</match>
